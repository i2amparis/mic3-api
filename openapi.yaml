openapi: 3.1.0
info:
  title: MIC3 Model Linking API
  version: 0.1.0
  description: |
    Common API contract for MIC3 model adapters. Developed in the context of the Horizon Europe project TRANSIENCE project (grant agreement No 101137606).
    
    Views and opinions expressed are those of the author(s) only and do not necessarily reflect those of the European Union or the European Health and Digital Executive Agency (HaDEA).
  contact:
    name: TRANSIENCE
    url: https://www.transience.eu

servers:
  - url: https://example.org/api/v1
    description: Example production server
  - url: http://localhost:8000/api/v1
    description: Local development server

tags:
  - name: Inputs
    description: Operations for creating and retrieving model input files.
  - name: Outputs
    description: Operations for retrieving model output files.
  - name: Config
    description: Operations for retrieving and updating model configuration files.
  - name: Simulation
    description: Operations for starting and monitoring model simulations.

paths:
  /inputs:
    post:
      tags:
        - Inputs
      operationId: createInputFile
      summary: Create a new input file for the model
      description: >
        Creates a new model input file from an uploaded IAMC long-format CSV
        file. A model adapter can translate this package into the model's native
        input format, such as model-specific CSV files, configuration files, or
        database records. The uploaded CSV must include the columns model,
        scenario, region, variable, unit, year, and value.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: >
                    IAMC long-format CSV file to apply to the model. The file
                    must include the columns model, scenario, region, variable,
                    unit, year, and value.
                description:
                  type: string
                  description: Human-readable description of the input file.
                  example: Baseline scenario inputs for 2030.
            encoding:
              file:
                contentType: text/csv
      responses:
        "201":
          description: Input file created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InputFile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      tags:
        - Inputs
      operationId: listInputFiles
      summary: Get all available input files
      description: >
        Returns the input files available to the model adapter, including
        metadata such as the file format and creation time.
        To retrieve the latest input file, use limit=1 and sort=-created_at.
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of input files to return.
          schema:
            type: integer
            minimum: 1
            default: 100
            example: 1
        - name: sort
          in: query
          required: false
          description: >
            Sort order for returned input files. Use -created_at to return the
            newest files first.
          schema:
            type: string
            enum:
              - created_at
              - -created_at
            default: -created_at
            example: -created_at
      responses:
        "200":
          description: Available input files returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InputFileList"

  /inputs/{input_id}:
    get:
      tags:
        - Inputs
      operationId: getInputFile
      summary: Get an input file with the specific ID
      description: >
        Returns metadata for a specific input file.
      parameters:
        - name: input_id
          in: path
          required: true
          description: Unique identifier of the input file.
          schema:
            type: string
            example: input_2026_001
      responses:
        "200":
          description: Input file returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InputFile"
        "404":
          $ref: "#/components/responses/NotFound"

  /outputs:
    get:
      tags:
        - Outputs
      operationId: listOutputFiles
      summary: Get all available output files
      description: >
        Returns the output files available from the model adapter, including
        metadata such as the file format and creation time.
        To retrieve the latest output file, use limit=1 and sort=-created_at.
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of output files to return.
          schema:
            type: integer
            minimum: 1
            default: 100
            example: 1
        - name: sort
          in: query
          required: false
          description: >
            Sort order for returned output files. Use -created_at to return the
            newest files first.
          schema:
            type: string
            enum:
              - created_at
              - -created_at
            default: -created_at
            example: -created_at
      responses:
        "200":
          description: Available output files returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputFileList"

  /outputs/{output_id}:
    get:
      tags:
        - Outputs
      operationId: getOutputFile
      summary: Get an output file with the specific ID
      description: >
        Returns metadata for a specific output file.
      parameters:
        - name: output_id
          in: path
          required: true
          description: Unique identifier of the output file.
          schema:
            type: string
            example: output_2026_001
      responses:
        "200":
          description: Output file returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputFile"
        "404":
          $ref: "#/components/responses/NotFound"

  /config:
    get:
      tags:
        - Config
      operationId: getConfigurationFiles
      summary: Retrieve model configuration files
      description: >
        Returns the simulation options and other configuration files available
        to the model adapter. Implementations may include download URLs or
        storage locations if the caller is allowed to retrieve the underlying
        files. The response should also include the generic configuration
        template used by POST /config, with parameter and value columns.
      responses:
        "200":
          description: Configuration files returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigFileList"
    post:
      tags:
        - Config
      operationId: updateConfigurationFiles
      summary: Update model configuration files
      description: >
        Updates model configuration files using a generic two-column CSV file.
        The CSV must contain a parameter column with the generic setting name
        to change, such as end_year, and a value column with the requested
        setting value, such as 2050. Each model adapter maps these generic
        parameters to its native configuration files and settings. If a model
        does not support changing a requested parameter, the adapter must report
        that parameter as unsupported in the response.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: >
                    Configuration update CSV file. The file must include two
                    columns: parameter and value.
                description:
                  type: string
                  description: Human-readable description of the configuration update.
                  example: Updated simulation options for a baseline run.
            encoding:
              file:
                contentType: text/csv
      responses:
        "200":
          description: Configuration files updated successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - updated_files
                  - applied_parameters
                  - unsupported_parameters
                properties:
                  updated_files:
                    type: array
                    description: Configuration files modified by the model adapter.
                    items:
                      $ref: "#/components/schemas/ConfigFile"
                  applied_parameters:
                    type: array
                    description: Generic configuration parameters successfully applied by the model adapter.
                    items:
                      type: object
                      required:
                        - parameter
                        - value
                      properties:
                        parameter:
                          type: string
                          description: Generic configuration parameter requested in the uploaded CSV file.
                          example: end_year
                        value:
                          description: Value applied to the native model configuration.
                          oneOf:
                            - type: string
                            - type: number
                            - type: integer
                            - type: boolean
                          example: 2050
                        native_parameter:
                          type: string
                          description: Native model configuration parameter that was updated.
                          example: simulation.end_year
                  unsupported_parameters:
                    type: array
                    description: >
                      Generic configuration parameters that could not be
                      applied because the model does not expose or support the
                      requested setting.
                    items:
                      type: object
                      required:
                        - parameter
                        - value
                        - reason
                      properties:
                        parameter:
                          type: string
                          description: Generic configuration parameter requested in the uploaded CSV file.
                          example: start_year
                        value:
                          description: Requested value that could not be applied.
                          oneOf:
                            - type: string
                            - type: number
                            - type: integer
                            - type: boolean
                          example: 2050
                        reason:
                          type: string
                          description: Explanation of why the parameter cannot be changed for this model.
                          example: This model does not allow users to change the simulation start year.
                  warnings:
                    type: array
                    description: Non-blocking issues found while updating configuration.
                    items:
                      type: string
                    example: []
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"

  /simulate:
    post:
      tags:
        - Simulation
      operationId: startSimulation
      summary: Start a model simulation
      description: >
        Starts a model simulation using the current input file and current
        configuration files available to the model adapter.
      responses:
        "202":
          description: Simulation start request accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationStatus"
        "409":
          description: A simulation is already running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /simulate/status:
    get:
      tags:
        - Simulation
      operationId: getSimulationStatus
      summary: Get simulation status
      description: >
        Returns compact, machine-readable information about the current or most
        recent simulation, such as whether the model is idle, running,
        completed, failed, or cancelled.
      responses:
        "200":
          description: Simulation status returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationStatus"

  /simulate/logs:
    get:
      tags:
        - Simulation
      operationId: getSimulationLogs
      summary: Stream model simulation logs
      description: >
        Streams or returns logs from the current or most recent model
        simulation. 
      parameters:
        - name: stream
          in: query
          required: false
          description: Whether to keep the connection open and stream new log lines.
          schema:
            type: boolean
            default: true
        - name: tail
          in: query
          required: false
          description: Number of recent log lines to return before streaming.
          schema:
            type: integer
            minimum: 1
            default: 100
      responses:
        "200":
          description: Simulation logs returned successfully.
          content:
            text/plain:
              schema:
                type: string
                description: Newline-delimited simulation log output.
                example: |
                  2026-05-25T15:30:00Z Starting simulation.
                  2026-05-25T15:31:00Z Simulation step completed.

  /simulate/cancel:
    post:
      tags:
        - Simulation
      operationId: cancelSimulation
      summary: Cancel the current simulation
      description: >
        Cancels the currently running simulation. If no simulation is running,
        the response indicates that no cancellation was performed.
      responses:
        "200":
          description: Cancellation request processed.
          content:
            application/json:
              schema:
                type: object
                required:
                  - cancelled
                  - message
                properties:
                  cancelled:
                    type: boolean
                    description: Whether a running simulation was cancelled.
                    example: false
                  message:
                    type: string
                    description: Human-readable result of the cancellation request.
                    example: No simulation is currently running.
                  simulation:
                    $ref: "#/components/schemas/SimulationStatus"

components:
  schemas:
    InputFile:
      type: object
      required:
        - input_id
        - filename
        - format
        - created_at
      properties:
        input_id:
          type: string
          description: Unique identifier of the input file.
          example: input_2026_001
        filename:
          type: string
          description: Name of the created or registered input file.
          example: case_study_input.csv
        description:
          type: string
          description: Human-readable description of the input file.
          example: Inputs for the baseline scenario.
        format:
          type: string
          description: Format of the uploaded IAMC long-format input file.
          enum:
            - csv
          example: csv
        created_at:
          type: string
          format: date-time
          description: Date and time when the input file was created.
          example: "2026-05-25T15:30:00Z"
        download_url:
          type: string
          format: uri
          description: Optional URL for downloading the input file.
          example: https://example.org/api/v1/inputs/input_2026_001/download
        modified_files:
          type: array
          description: Native model files modified when creating this input file.
          items:
            type: string
          example:
            - model_inputs.sqlite
        warnings:
          type: array
          description: Non-blocking issues found while creating the input file.
          items:
            type: string
          example: []

    InputFileList:
      type: object
      required:
        - items
        - count
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/InputFile"
        count:
          type: integer
          minimum: 0
          description: Number of input files returned.
          example: 2

    OutputFile:
      type: object
      required:
        - output_id
        - filename
        - format
        - created_at
      properties:
        output_id:
          type: string
          description: Unique identifier of the output file.
          example: output_2026_001
        filename:
          type: string
          description: Name of the output file.
          example: model_results.csv
        description:
          type: string
          description: Human-readable description of the output file.
          example: Simulation outputs in IAMC long format.
        format:
          type: string
          description: Format of the output file.
          enum:
            - csv
          example: csv
        created_at:
          type: string
          format: date-time
          description: Date and time when the output file was created.
          example: "2026-05-25T16:30:00Z"
        simulation_id:
          type: string
          description: Identifier of the simulation that produced this output file.
          example: simulation_2026_001
        download_url:
          type: string
          format: uri
          description: Optional URL for downloading the output file.
          example: https://example.org/api/v1/outputs/output_2026_001/download
        warnings:
          type: array
          description: Non-blocking issues found while creating the output file.
          items:
            type: string
          example: []

    OutputFileList:
      type: object
      required:
        - items
        - count
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OutputFile"
        count:
          type: integer
          minimum: 0
          description: Number of output files returned.
          example: 2

    ConfigFile:
      type: object
      required:
        - config_id
        - filename
        - format
        - updated_at
      properties:
        config_id:
          type: string
          description: Unique identifier of the configuration file.
          example: config_simulation_options
        filename:
          type: string
          description: Name of the configuration file.
          example: simulation_options.toml
        description:
          type: string
          description: Human-readable description of the configuration file.
          example: Simulation options used by the model adapter.
        format:
          type: string
          description: Format of the configuration file.
          example: toml
        updated_at:
          type: string
          format: date-time
          description: Date and time when the configuration file was last updated.
          example: "2026-05-25T15:30:00Z"
        download_url:
          type: string
          format: uri
          description: Optional URL for downloading the configuration file.
          example: https://example.org/api/v1/config/config_simulation_options/download
        warnings:
          type: array
          description: Non-blocking issues found while updating the configuration file.
          items:
            type: string
          example: []

    ConfigFileList:
      type: object
      required:
        - items
        - count
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ConfigFile"
        count:
          type: integer
          minimum: 0
          description: Number of configuration files returned.
          example: 1

    SimulationStatus:
      type: object
      required:
        - state
      properties:
        simulation_id:
          type: string
          description: Unique identifier of the simulation.
          example: simulation_2026_001
        state:
          $ref: "#/components/schemas/SimulationState"
        started_at:
          type: string
          format: date-time
          description: Date and time when the simulation started.
          example: "2026-05-25T15:30:00Z"
        finished_at:
          type: string
          format: date-time
          description: Date and time when the simulation finished.
          example: "2026-05-25T16:30:00Z"
        message:
          type: string
          description: Human-readable status message.
          example: Simulation is running.

    SimulationState:
      type: string
      description: Current state of the model simulation.
      enum:
        - idle
        - running
        - completed
        - failed
        - cancelled

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code that is not tied to a specific resource type.
          example: resource_not_found
        message:
          type: string
          description: Human-readable error message.
          example: The requested resource could not be found.
        resource_type:
          type: string
          description: Optional type of resource related to the error.
          example: output_file
        resource_id:
          type: string
          description: Optional identifier of the resource related to the error.
          example: output_2026_001
        details:
          type: object
          additionalProperties: true
          description: Optional structured details about the error.

  responses:
    BadRequest:
      description: The request could not be processed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: The uploaded file did not pass validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
